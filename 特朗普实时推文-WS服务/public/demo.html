<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>实时演示 · Trump WS</title>
<link rel="stylesheet" href="/app.css">
<style>
  .demo-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 4px;
    margin-bottom: 16px;
  }
  .demo-bar input { flex: 1; }
  .demo-bar .status-text { font-size: 12px; color: var(--dim); min-width: 120px; }
  .meta-bar {
    display: flex; gap: 16px; padding: 8px 0; margin-bottom: 12px;
    font-size: 12px; color: var(--dim);
  }
  .meta-bar b { color: var(--txt); font-family: var(--mono); font-weight: 500; margin-left: 4px; }

  .feed { display: flex; flex-direction: column; gap: 0; }
  .item {
    padding: 16px;
    border: 1px solid var(--line);
    border-top: 0;
    background: var(--surface);
  }
  .item:first-child { border-top: 1px solid var(--line); }
  .item.new { background: var(--surface-2); border-left: 2px solid var(--accent); }
  .item .row1 {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    margin-bottom: 8px; font-size: 12px; color: var(--dim);
  }
  .item .row1 .src {
    text-transform: uppercase; font-family: var(--mono); font-size: 11px;
    padding: 1px 6px; border-radius: 2px; border: 1px solid var(--line-2);
    color: var(--txt-2);
  }
  .item .row1 .src.rss { color: var(--ok); border-color: rgba(106,164,92,.4); }
  .item .row1 .src.truth { color: var(--accent); border-color: rgba(200,122,61,.4); }
  .item .row1 .src.mastodon { color: var(--warn); border-color: rgba(211,154,60,.4); }
  .item .row1 .lag.warn { color: var(--warn); }
  .item .row1 .lag.slow { color: var(--bad); }
  .item .row1 a { color: var(--accent); }
  .item .title {
    font-size: 14.5px; color: var(--txt); line-height: 1.55;
    margin: 4px 0; white-space: pre-wrap;
  }
  .item .tr {
    margin-top: 8px; padding: 8px 12px; background: var(--bg-2);
    border-left: 2px solid var(--line-2); font-size: 13.5px;
    color: var(--txt-2); white-space: pre-wrap;
  }
  .item .tr .label {
    font-size: 11px; color: var(--mute); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px;
  }
  .item .media { margin-top: 10px; }
  .item .media img { max-width: 100%; max-height: 360px; border-radius: 3px; border: 1px solid var(--line); display: block; }
  .item details { margin-top: 10px; }
  .item details summary {
    font-size: 12px; color: var(--dim); cursor: pointer;
    user-select: none;
  }
  .item details pre { margin-top: 6px; font-size: 11.5px; max-height: 220px; }

  .empty {
    padding: 60px 24px; text-align: center; color: var(--dim);
    border: 1px dashed var(--line-2); border-radius: 4px;
    background: var(--bg-2);
  }
  .empty h3 { margin: 0 0 6px; color: var(--txt-2); }
  .empty p { font-size: 12px; margin: 0; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="mark">TRUMP-WS</span>
      <span class="name">实时演示</span>
    </div>
    <nav>
      <a href="/">首页</a>
      <a href="/demo" class="active">演示</a>
      <a href="/docs">文档</a>
      <a href="/admin">管理</a>
    </nav>
  </div>
</div>

<div class="wrap">

  <div class="demo-bar">
    <span class="conn-dot off" id="dot"></span>
    <span class="status-text" id="statusText">未连接</span>
    <input id="token" placeholder="粘贴 ttws_live_… API Key" autocomplete="off" spellcheck="false">
    <button class="btn primary" id="btn">连接</button>
  </div>

  <div class="meta-bar">
    <span>已接收<b id="rcvCount">0</b></span>
    <span>订阅<b id="srcLabel">all</b></span>
    <span>最近端到端延迟<b id="lastLatency">—</b></span>
  </div>

  <div id="list">
    <div class="empty">
      <h3>等待连接</h3>
      <p>粘贴 API Key,点"连接"。没有 Key 请到 <a href="/admin">管理后台</a> 生成。</p>
    </div>
  </div>

</div>

<script>
'use strict';
const $ = (id) => document.getElementById(id);
let ws = null, items = [], received = 0;
const MAX = 50;

function setStatus(text, cls) {
  $('statusText').textContent = text;
  $('dot').className = 'conn-dot ' + (cls === 'connected' ? '' : cls === 'connecting' ? 'connecting' : 'off');
}

function fmtLatencyMs(ms) {
  if (ms == null || !isFinite(ms)) return null;
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms/1000).toFixed(1) + 's';
  return Math.floor(ms/60000) + 'm' + Math.floor((ms/1000) % 60) + 's';
}
function latencyClass(ms) {
  if (ms == null) return '';
  if (ms < 10000) return '';
  if (ms < 60000) return 'warn';
  return 'slow';
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function render() {
  $('rcvCount').textContent = received;
  if (items.length === 0) {
    $('list').innerHTML = '<div class="empty"><h3>已连接,等待新推文</h3><p>服务每 10 秒轮询一次上游源。Trump 不发新帖时不会有数据。</p></div>';
    return;
  }
  $('list').innerHTML = '<div class="feed">' + items.map((t, idx) => {
    const recv = t.received_at ? new Date(t.received_at).getTime() : Date.now();
    const pub = t.pubDate ? new Date(t.pubDate).getTime() : recv;
    const lag = recv - pub;
    const lagStr = fmtLatencyMs(lag);
    const time = new Date(t.pubDate || t.received_at).toLocaleString('zh-CN', { hour12: false });
    const srcCls = (t.source || '').toLowerCase();
    return `
    <article class="item${idx === 0 && t._isNew ? ' new' : ''}">
      <div class="row1">
        <span class="src ${esc(srcCls)}">${esc(t.source || '?')}</span>
        <span>${esc(time)}</span>
        ${t.author ? `<span>${esc(t.author)}</span>` : ''}
        ${lagStr ? `<span class="lag ${latencyClass(lag)}" title="发布→接收延迟">+${lagStr}</span>` : ''}
        ${t.link ? `<a href="${esc(t.link)}" target="_blank" rel="noopener">原文 ↗</a>` : ''}
      </div>
      <div class="title">${esc(t.title || '(无正文)')}</div>
      ${t.translated && t.translated !== t.title ? `
        <div class="tr">
          <div class="label">中文翻译</div>${esc(t.translated)}
        </div>` : ''}
      ${t.mediaUrl ? `<div class="media"><img src="${esc(t.mediaUrl)}" alt=""/></div>` : ''}
      <details><summary>原始 JSON</summary><pre>${esc(JSON.stringify(t, null, 2))}</pre></details>
    </article>`;
  }).join('') + '</div>';
  setTimeout(() => { items.forEach(t => t._isNew = false); }, 1500);

  if (items[0]) {
    const lag = (items[0].received_at ? new Date(items[0].received_at).getTime() : Date.now()) - new Date(items[0].pubDate || items[0].received_at).getTime();
    const v = fmtLatencyMs(lag);
    if (v) $('lastLatency').textContent = v;
  }
}

function connect() {
  const tok = $('token').value.trim();
  if (!tok) { setStatus('请先填 API Key', 'off'); return; }
  if (ws) { try { ws.close(); } catch {} ws = null; }
  setStatus('连接中…', 'connecting');
  const u = new URL('/ws', location.href);
  u.protocol = u.protocol === 'https:' ? 'wss:' : 'ws:';
  u.searchParams.set('token', tok);
  ws = new WebSocket(u.toString());
  ws.onopen = () => {
    setStatus('已连接', 'connected');
    ws.send(JSON.stringify({ type: 'subscribe', source: 'all' }));
    ws.send(JSON.stringify({ type: 'history', limit: 20 }));
  };
  ws.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    if (m.type === 'tweet') {
      m.data._isNew = true;
      items.unshift(m.data); items = items.slice(0, MAX);
      received++; render();
    } else if (m.type === 'history') {
      items = m.data.slice(0, MAX); received = items.length; render();
    } else if (m.type === 'subscribed') {
      $('srcLabel').textContent = m.source || 'all';
    }
  };
  ws.onerror = () => setStatus('连接错误', 'off');
  ws.onclose = (e) => {
    const reason = e.reason || '';
    const codeText = e.code === 4003 ? 'key 被撤销或过期' : ('code ' + e.code);
    setStatus('已断开 · ' + (reason || codeText), 'off');
  };
}

$('btn').onclick = connect;
$('token').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });

const urlTok = new URLSearchParams(location.search).get('token');
if (urlTok) { $('token').value = urlTok; setTimeout(connect, 200); }
</script>
</body>
</html>
